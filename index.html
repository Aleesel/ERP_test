<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование ЕРП 2.5</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f4f4f9; }
        h1, h2 { color: #333; text-align: center; }
        .menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        button.secondary:hover { background: #545b62; }
        button.danger { background: #dc3545; }
        button.danger:hover { background: #bd2130; }
        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .option { display: block; margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .option:hover { background: #e9ecef; }
        .option.selected { background: #cce5ff; border-color: #007bff; }
        .correct { background: #d4edda !important; border-color: #c3e6cb !important; }
        .wrong { background: #f8d7da !important; border-color: #f5c6cb !important; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .stat-item { background: #fff; padding: 10px; border-radius: 5px; text-align: center; border: 1px solid #ddd; }
        input[type="number"] { padding: 8px; width: 60px; font-size: 16px; }
        .checkbox-group { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; background: white; }
        .checkbox-item { margin: 5px 0; }
    </style>
</head>
<body>

<div id="app">
    <h1>Тестирование ЕРП 2.5</h1>
    
    <!-- Главное меню -->
    <div id="main-menu" class="card">
        <div class="menu">
            <button onclick="showScreen('setup-screen')">Начать тест</button>
            <button onclick="startExam()">Экзамен (14 вопр./блок)</button>
            <button onclick="showScreen('stats-screen')">Статистика</button>
            <button onclick="showScreen('errors-screen')">Работа над ошибками</button>
        </div>
    </div>

    <!-- Настройка теста -->
    <div id="setup-screen" class="card hidden">
        <h2>Настройки теста</h2>
        <label>Количество вопросов: <input type="number" id="question-count" value="10" min="1"></label>
        <br><br>
        <p>Выберите блоки:</p>
        <button class="secondary" onclick="toggleAllBlocks(true)">Выбрать все</button>
        <button class="secondary" onclick="toggleAllBlocks(false)">Снять все</button>
        <div id="blocks-list" class="checkbox-group"></div>
        <br>
        <button onclick="startTest()">Старт</button>
        <button class="secondary" onclick="showScreen('main-menu')">Назад</button>
    </div>

    <!-- Экран вопроса -->
    <div id="quiz-screen" class="card hidden">
        <div style="display:flex; justify-content:space-between;">
            <span id="progress-text">Вопрос 1 из 10</span>
            <span id="block-name" style="color:#666; font-size:0.9em;"></span>
        </div>
        <h3 id="question-text">Текст вопроса</h3>
        <div id="answers-list"></div>
        <div id="feedback" class="hidden" style="margin-top:15px; font-weight:bold;"></div>
        <br>
        <button id="next-btn" onclick="nextQuestion()" class="hidden">Следующий вопрос</button>
        <button id="check-btn" onclick="checkAnswer()">Ответить</button>
        <button class="secondary" onclick="finishTest()">Завершить досрочно</button>
    </div>

    <!-- Результаты -->
    <div id="result-screen" class="card hidden">
        <h2>Тест завершен!</h2>
        <p>Правильных ответов: <span id="score-result"></span></p>
        <button onclick="showScreen('main-menu')">В меню</button>
    </div>

    <!-- Статистика -->
    <div id="stats-screen" class="card hidden">
        <h2>Статистика по блокам</h2>
        <div id="stats-container" class="stats-grid"></div>
        <br>
        <button class="danger" onclick="resetStats()">Сбросить статистику</button>
        <button class="secondary" onclick="showScreen('main-menu')">Назад</button>
    </div>

    <!-- Ошибки -->
    <div id="errors-screen" class="card hidden">
        <h2>Работа над ошибками</h2>
        <p>Выберите блок для повторения вопросов, в которых были ошибки:</p>
        <div id="error-blocks-list" class="checkbox-group"></div>
        <br>
        <button onclick="startErrorReview()">Начать работу</button>
        <button class="secondary" onclick="showScreen('main-menu')">Назад</button>
    </div>
</div>

<script>
// === ДАННЫЕ (Вставьте сюда полный список вопросов из JSON, если он у вас есть) ===
// Для примера 5 вопросов. Замените этот массив на полный список из 802 вопросов.
const allQuestions = [
    {
        id: 1,
        block: "Блок 1. Общие сведения",
        question: "Что является основной целью внедрения ERP системы?",
        answers: ["Автоматизация всех бизнес-процессов", "Увеличение штата сотрудников", "Сокращение производства", "Исключительно бухгалтерский учет"],
        correct: 0
    },
    {
        id: 2,
        block: "Блок 1. Общие сведения",
        question: "Какая версия ЕРП рассматривается в методичке?",
        answers: ["2.4", "2.5", "3.0", "1С:Предприятие 8"],
        correct: 1
    },
    {
        id: 3,
        block: "Блок 2. НСИ и администрирование",
        question: "Что такое НСИ?",
        answers: ["Нормативно-справочная информация", "Новая система интеграции", "Набор системных инструкций", "Неверный ответ"],
        correct: 0
    },
    {
        id: 4,
        block: "Блок 3. Продажи",
        question: "Какой документ является основанием для отгрузки товара?",
        answers: ["Заказ клиента", "Реализация товаров и услуг", "Счет на оплату", "Коммерческое предложение"],
        correct: 1
    },
    {
        id: 5,
        block: "Блок 4. Закупки",
        question: "Что создается на основании заказа поставщику?",
        answers: ["Поступление товаров", "Заказ клиента", "Счет-фактура", "Акт сверки"],
        correct: 0
    }
    // СЮДА МОЖНО ВСТАВИТЬ ОСТАЛЬНЫЕ 797 ВОПРОСОВ В ТАКОМ ЖЕ ФОРМАТЕ
];

// === СОСТОЯНИЕ ПРИЛОЖЕНИЯ ===
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let errorMode = false;
let stats = JSON.parse(localStorage.getItem('erpStats')) || {}; 
// Структура stats: { "Блок 1": {total: 10, correct: 8}, "Ошибки": [1, 5, 12] (ID вопросов) }

if (!stats.errors) stats.errors = [];

// === ИНИЦИАЛИЗАЦИЯ ===
document.addEventListener('DOMContentLoaded', () => {
    renderBlockCheckboxes('blocks-list', true);
    renderBlockCheckboxes('error-blocks-list', false);
    updateStatsDisplay();
});

// === НАВИГАЦИЯ ===
function showScreen(screenId) {
    document.querySelectorAll('.card').forEach(el => el.classList.add('hidden'));
    document.getElementById(screenId).classList.remove('hidden');
    if (screenId === 'stats-screen') updateStatsDisplay();
    if (screenId === 'errors-screen') renderErrorBlocks();
}

// === ЛОГИКА БЛОКОВ ===
function getUniqueBlocks() {
    return [...new Set(allQuestions.map(q => q.block))].sort();
}

function renderBlockCheckboxes(containerId, forTest) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const blocks = getUniqueBlocks();
    
    blocks.forEach((block, index) => {
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        const checked = forTest ? 'checked' : '';
        div.innerHTML = `
            <label>
                <input type="checkbox" value="${block}" ${checked}> ${block}
            </label>
        `;
        container.appendChild(div);
    });
}

function toggleAllBlocks(state) {
    const checkboxes = document.querySelectorAll('#blocks-list input[type="checkbox"]');
    checkboxes.forEach(cb => cb.checked = state);
}

// === ЗАПУСК ТЕСТА ===
function startTest() {
    const count = parseInt(document.getElementById('question-count').value);
    const selectedBlocks = Array.from(document.querySelectorAll('#blocks-list input:checked')).map(cb => cb.value);
    
    if (selectedBlocks.length === 0) {
        alert('Выберите хотя бы один блок!');
        return;
    }

    const filtered = allQuestions.filter(q => selectedBlocks.includes(q.block));
    if (filtered.length === 0) {
        alert('В выбранных блоках нет вопросов.');
        return;
    }

    // Перемешиваем и берем нужное количество
    currentQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, count);
    
    startQuizSession(false);
}

function startExam() {
    const examQuestions = [];
    const blocks = getUniqueBlocks();
    
    blocks.forEach(block => {
        const blockQuestions = allQuestions.filter(q => q.block === block);
        const selected = blockQuestions.sort(() => 0.5 - Math.random()).slice(0, 14);
        examQuestions.push(...selected);
    });

    if (examQuestions.length === 0) {
        alert('Нет данных для экзамена.');
        return;
    }

    currentQuestions = examQuestions;
    startQuizSession(false);
}

function startErrorReview() {
    const selectedBlocks = Array.from(document.querySelectorAll('#error-blocks-list input:checked')).map(cb => cb.value);
    
    // Берем вопросы, которые есть в статистике ошибок И в выбранных блоках
    const errorIds = new Set(stats.errors);
    const reviewQuestions = allQuestions.filter(q => 
        errorIds.has(q.id) && (selectedBlocks.length === 0 || selectedBlocks.includes(q.block))
    );

    if (reviewQuestions.length === 0) {
        alert('Нет ошибок для повторения в выбранных блоках.');
        return;
    }

    currentQuestions = reviewQuestions;
    startQuizSession(true);
}

function startQuizSession(isErrorMode) {
    errorMode = isErrorMode;
    currentIndex = 0;
    score = 0;
    showScreen('quiz-screen');
    renderQuestion();
}

// === ПРОЦЕСС ТЕСТА ===
function renderQuestion() {
    const q = currentQuestions[currentIndex];
    document.getElementById('progress-text').textContent = `Вопрос ${currentIndex + 1} из ${currentQuestions.length}`;
    document.getElementById('block-name').textContent = q.block;
    document.getElementById('question-text').textContent = q.question;
    
    const answersDiv = document.getElementById('answers-list');
    answersDiv.innerHTML = '';
    
    q.answers.forEach((ans, idx) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.textContent = ans;
        div.onclick = () => selectOption(idx);
        div.dataset.index = idx;
        answersDiv.appendChild(div);
    });

    document.getElementById('feedback').classList.add('hidden');
    document.getElementById('check-btn').classList.remove('hidden');
    document.getElementById('next-btn').classList.add('hidden');
}

let selectedOptionIndex = null;

function selectOption(idx) {
    if (document.getElementById('check-btn').classList.contains('hidden')) return; // Уже ответили
    
    selectedOptionIndex = idx;
    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
    document.querySelector(`.option[data-index="${idx}"]`).classList.add('selected');
}

function checkAnswer() {
    if (selectedOptionIndex === null) {
        alert('Выберите вариант ответа!');
        return;
    }

    const q = currentQuestions[currentIndex];
    const isCorrect = selectedOptionIndex === q.correct;
    const options = document.querySelectorAll('.option');
    
    // Подсветка
    options[q.correct].classList.add('correct');
    if (!isCorrect) {
        options[selectedOptionIndex].classList.add('wrong');
        // Запись ошибки
        if (!stats.errors.includes(q.id)) {
            stats.errors.push(q.id);
            saveStats();
        }
    } else {
        score++;
        // Если ответил правильно после ошибки, можно убрать из списка ошибок (опционально)
        // stats.errors = stats.errors.filter(id => id !== q.id); 
        // saveStats();
    }

    // Обновление общей статистики блока
    if (!stats[q.block]) stats[q.block] = { total: 0, correct: 0 };
    stats[q.block].total++;
    if (isCorrect) stats[q.block].correct++;
    saveStats();

    document.getElementById('feedback').textContent = isCorrect ? 'Верно!' : 'Ошибка!';
    document.getElementById('feedback').className = isCorrect ? 'correct' : 'wrong';
    document.getElementById('feedback').classList.remove('hidden');
    
    document.getElementById('check-btn').classList.add('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
}

function nextQuestion() {
    currentIndex++;
    selectedOptionIndex = null;
    if (currentIndex < currentQuestions.length) {
        renderQuestion();
    } else {
        finishTest();
    }
}

function finishTest() {
    document.getElementById('score-result').textContent = `${score} из ${currentQuestions.length}`;
    showScreen('result-screen');
}

// === СТАТИСТИКА ===
function updateStatsDisplay() {
    const container = document.getElementById('stats-container');
    container.innerHTML = '';
    
    const blocks = getUniqueBlocks();
    blocks.forEach(block => {
        const data = stats[block] || { total: 0, correct: 0 };
        const percent = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
        
        const div = document.createElement('div');
        div.className = 'stat-item';
        div.innerHTML = `
            <strong>${block}</strong><br>
            Верно: ${data.correct}/${data.total}<br>
            <span style="color:${percent > 70 ? 'green' : 'red'}">${percent}%</span>
        `;
        container.appendChild(div);
    });
}

function resetStats() {
    if(confirm('Вы уверены? Вся статистика будет удалена.')) {
        stats = { errors: [] };
        saveStats();
        updateStatsDisplay();
        alert('Статистика сброшена.');
    }
}

function saveStats() {
    localStorage.setItem('erpStats', JSON.stringify(stats));
}

function renderErrorBlocks() {
    const container = document.getElementById('error-blocks-list');
    container.innerHTML = '';
    const blocks = getUniqueBlocks();
    
    // Фильтруем только те блоки, где есть ошибки
    const blocksWithErrors = blocks.filter(block => {
        const blockQuestions = allQuestions.filter(q => q.block === block);
        return blockQuestions.some(q => stats.errors.includes(q.id));
    });

    if (blocksWithErrors.length === 0) {
        container.innerHTML = '<p>Ошибок пока нет. Отличная работа!</p>';
        return;
    }

    blocksWithErrors.forEach(block => {
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        div.innerHTML = `
            <label>
                <input type="checkbox" value="${block}" checked> ${block}
            </label>
        `;
        container.appendChild(div);
    });
}
</script>

</body>
</html>
